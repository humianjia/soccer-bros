    <script>
        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const categories = {
            'all': 'All Games',
            'action': 'Action',
            'fps': 'FPS',
            'battle-royale': 'Battle',
            'sniper': 'Sniper',
            'multiplayer': 'Multiplayer'
        };

        const categoryDataMap = {
            'all': [...(window.gamesData || []), ...(window.actionGames || []), ...(window.battleRoyaleData || []), ...(window.fpsData || []), ...(window.multiplayerGames || []), ...(window.sniperData || [])],
            'action': window.actionGames || [],
            'fps': window.fpsData || [],
            'battle-royale': window.battleRoyaleData || [],
            'sniper': window.sniperData || [],
            'multiplayer': window.multiplayerGames || []
        };

        function highlightCurrentCategory() {
            const currentCategory = getURLParam('category') || 'all';
            const navItems = document.querySelectorAll('.menu-link');
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (href.includes(`category=${currentCategory}`)) {
                    item.style.color = '#f59e0b';
                    item.style.background = 'rgba(245, 158, 11, 0.12)';
                }
            });
        }

        function loadGamesByCategory() {
            const container = document.getElementById('games-list-container');
            const titleElement = document.getElementById('games-section-title');
            if (!container || !titleElement) return;

            const currentCategory = getURLParam('category') || 'all';
            const categoryName = categories[currentCategory] || 'All Games';
            titleElement.textContent = categoryName;

            const allGames = categoryDataMap[currentCategory] || [];
            container.innerHTML = '';

            allGames.forEach((game) => {
                const gameItem = document.createElement('div');
                gameItem.className = 'game-item';
                const imageUrl = game.imageUrl;
                gameItem.innerHTML = `
                    <img src="${imageUrl}" alt="${game.name}" onerror="this.src='img/icon/veckIo.jpg'">
                    <div class="game-item-title">${game.name}</div>
                `;
                gameItem.addEventListener('click', function() {
                    if (game.link) {
                        window.location.href = game.link;
                    } else if (window.parent.loadGame) {
                        window.parent.loadGame(game.originalIndex || 0);
                    } else {
                        window.location.href = 'index.html?game=' + (game.originalIndex || 0);
                    }
                });
                container.appendChild(gameItem);
            });

            highlightCurrentCategory();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(loadGamesByCategory, 100);
        });
    </script>
